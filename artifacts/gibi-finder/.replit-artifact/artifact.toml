kind = "web"
previewPath = "/"
title = "Gibi Finder"
version = "1.0.0"
id = "artifacts/gibi-finder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21163

[services.development]
run = "pnpm --filter @workspace/gibi-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gibi-finder", "run", "build" ]
publicDir = "artifacts/gibi-finder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21163"
BASE_PATH = "/"
